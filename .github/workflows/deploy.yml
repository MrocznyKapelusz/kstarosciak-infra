name: Connect to an AWS role from a GitHub repository

on: 
  push:
    branches: 
    - master
  pull_request:
    branches:
      - master

permissions:
      id-token: write   
      contents: read   

jobs:    
  TofuPlan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3

      - uses: ./.github/actions/setup
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
     
      - name: Initialize
        run: |
          tofu init \
          -backend-config="bucket=${{ secrets.STATE_BUCKET_NAME }}" \
          -backend-config="region=${{ secrets.AWS_REGION }}" \
          -backend-config="key=${{ secrets.STATE_FILE_KEY }}"

      - name: Plan
        run: tofu plan -var="hcloud_token=${{ secrets.HETZNER_API_KEY }}"  

  TofuApply:
    needs: TofuPlan
    runs-on: ubuntu-latest
    environment: prod
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3
       
      - uses: ./.github/actions/setup-env
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
           
      - run: tofu apply -auto-approve -var="hcloud_token=${{ secrets.HETZNER_API_KEY }}"
